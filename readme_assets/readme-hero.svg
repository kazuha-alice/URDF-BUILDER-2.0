<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-label="URDF Builder 2.0 One UI inspired robotics workbench">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10161a"/>
      <stop offset="0.52" stop-color="#172027"/>
      <stop offset="1" stop-color="#090d10"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#84fff0"/>
      <stop offset="1" stop-color="#43b8aa"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffc66f"/>
